<!DOCTYPE html>
<html>
<head>
    <title>AI Smart Contract Auditor</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        #result { background: #f4f4f4; padding: 15px; border-radius: 5px; white-space: pre-wrap; }
        .status { color: blue; font-weight: bold; }
    </style>
</head>
<body>

    <h2>AI Smart Contract Security Audit</h2>
    <p>Cost: 1 USDC (gasless via Facinet)</p>

    <input type="file" id="contractFile" accept=".sol" />
    <br><br>
    <button id="auditBtn">Pay & Run Audit</button>

    <p id="status" class="status"></p>
    <pre id="result"></pre>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <h3 id="downloadHeader" style="display:none; margin-top: 10px;">Your ai analyis is here!....</h3>
    <button id="downloadBtn" style="display:none; background: #10b981; margin-top: 10px;">Download PDF Report</button>
    <script>
  const AUDIT_URL = "http://localhost:8000/audit";
  const PAY_URL = "http://localhost:8000/pay";
  
  // 1. Move these to the top (Global Scope)
  const downloadBtn = document.getElementById("downloadBtn");
  const downloadHeader=document.getElementById("downloadHeader");
  let lastReport = null; 

  async function runAudit() {
    const fileInput = document.getElementById("contractFile");
    const statusBox = document.getElementById("status");
    const resultBox = document.getElementById("result");
    const btn = document.getElementById("auditBtn");

    if (!fileInput.files.length) return alert("Please select a .sol file");

    try {
      btn.disabled = true;
      downloadBtn.style.display = "none"; // Hide button if running a new audit
      downloadHeader.style.display="none";
      statusBox.textContent = "Checking payment requirements...";

      const checkForm = new FormData();
      checkForm.append("contract", fileInput.files[0]);

      let response = await fetch(AUDIT_URL, { method: "POST", body: checkForm });

      // Handle Payment Required
      if (response.status === 402) {
        statusBox.textContent = "Processing gasless USDC payment...";
        const payRes = await fetch(PAY_URL, { method: "POST" });
        if (!payRes.ok) throw new Error("Payment failed.");

        const paymentResult = await payRes.json();
        const paymentProof = btoa(JSON.stringify(paymentResult));

        statusBox.textContent = "Payment confirmed! Running AI Audit...";
        const auditForm = new FormData();
        auditForm.append("contract", fileInput.files[0]);

        response = await fetch(AUDIT_URL, {
          method: "POST",
          headers: { "x-payment": paymentProof },
          body: auditForm
        });
      }

      const data = await response.json();
      
      if (data.success) {
        // 2. STORE the report data for the PDF
        lastReport = data.report; 
        
        // 3. SHOW the download button
        downloadBtn.style.display = "block"; 
        downloadHeader.style.display = "block";
        
        resultBox.textContent = data.report.aiAnalysis;
        statusBox.textContent = "Audit Complete.";
      } else {
        throw new Error(data.error || "Audit failed");
      }

    } catch (err) {
      console.error(err);
      resultBox.textContent = "Error: " + err.message;
      statusBox.textContent = "";
    } finally {
      btn.disabled = false;
    }
  }

  // 4. Move PDF logic out of runAudit
  function generatePDF(report) {
    if (!report) return;
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // PDF Config
    const margin = 20;
    const pageHeight = doc.internal.pageSize.height;
    let cursorY = 20; // Tracks vertical position

    // 1. Header
    doc.setFont("helvetica", "bold");
    doc.setFontSize(22);
    doc.text("Smart Contract Security Audit", margin, cursorY);
    cursorY += 15;

    // 2. Metadata
    doc.setFontSize(12);
    doc.setFont("helvetica", "normal");
    doc.text(`File: ${report.contract}`, margin, cursorY);
    cursorY += 8;
    doc.text(`Security Score: ${report.securityScore}/100`, margin, cursorY);
    cursorY += 8;
    doc.text(`On-Chain TX: ${report.onChainTx || 'N/A'}`, margin, cursorY);
    cursorY += 15;

    // 3. AI Analysis Section
    doc.setFont("helvetica", "bold");
    doc.text("AI Analysis Report:", margin, cursorY);
    cursorY += 10;

    // 4. Smart Multi-page Text Handling
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    
    // Split the AI analysis into lines that fit the page width
    const splitText = doc.splitTextToSize(report.aiAnalysis, 170);
    const lineHeight = 7;

    splitText.forEach((line) => {
        // Check if the current line will exceed the page height
        if (cursorY + lineHeight > pageHeight - margin) {
            doc.addPage(); // Add a new page
            cursorY = 20;  // Reset cursor to top of new page
        }
        doc.text(line, margin, cursorY);
        cursorY += lineHeight; // Move cursor down for the next line
    });

    // 5. Footer (Optional)
    doc.setFontSize(8);
    doc.setTextColor(150);
    doc.text(`Generated on: ${new Date().toLocaleString()}`, margin, pageHeight - 10);

    doc.save(`${report.contract.replace('.sol', '')}_Audit_Report.pdf`);
}

  // Event Listeners
  document.getElementById("auditBtn").addEventListener("click", runAudit);
  downloadBtn.addEventListener("click", () => generatePDF(lastReport));
</script>
</body>
</html>
